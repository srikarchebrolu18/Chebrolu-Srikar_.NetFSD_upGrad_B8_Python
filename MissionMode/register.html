<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-box {
            border: 20px solid skyblue;
            padding: 30px;
            width: 300px;
            text-align: center;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 10px 0;
        }

        button {
            padding: 8px 15px;
        }
        .gender {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
    </style>
</head>

<body>

<div class="form-box">
    <h2>Register</h2>
    <img src="sap-icon.png" width="60px" alt="">
    <form action="NavMenu.html">
        <input type="text" id="fullname" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="tel" id="phone" pattern="[0-9]{10}" placeholder="Phone Number" required>
        <div class="gender">
        <label>Gender:</label>
        <label>
            <input type="radio" name="gender"> Male
        </label>
        <label>
            <input type="radio" name="gender"> Female
        </label>
        </div>
        <input type="age" min="18" max="40" id="age" placeholder="Age" required>
        <input type="password" id="password" minlength="6" maxlength="12" placeholder="Password" required>
        <button type="button" id="register">Register</button>
    <p>Already have an account? 
        <a href="login.html">Login</a>
    </p>
</div>

</body>
</html>
