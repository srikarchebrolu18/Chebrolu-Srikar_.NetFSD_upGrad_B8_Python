<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Form</title>


    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


    <style>
        body {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            height: 100vh;
        }
    </style>
</head>
<body>


<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">My App Login</span>
    </div>
</nav>


<!-- Login Section -->
<div class="container d-flex justify-content-center align-items-center" style="height: 90vh;">
    <div class="col-md-4 col-sm-8">
        <div class="card shadow-lg p-4">
            <h3 class="text-center mb-4">Login</h3>


            <form id="loginForm">


                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-control">
                    <div id="emailError" class="text-danger small"></div>
                </div>


                <!-- Password -->
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control">
                    <div id="passwordError" class="text-danger small"></div>
                </div>


                <!-- Login Button -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">Login</button>
                </div>


                <!-- Success Message -->
                <div id="successMessage" class="text-success text-center mt-3"></div>


            </form>
        </div>
    </div>
</div>


<!-- JavaScript -->
<script>
document.getElementById("loginForm").addEventListener("submit", function(event) {
    event.preventDefault();


    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();


    let emailError = document.getElementById("emailError");
    let passwordError = document.getElementById("passwordError");
    let successMessage = document.getElementById("successMessage");


    emailError.textContent = "";
    passwordError.textContent = "";
    successMessage.textContent = "";


    let isValid = true;


    // Email validation
    if (email === "") {
        emailError.textContent = "Email is required";
        isValid = false;
    }


    // Password validation
    if (password === "") {
        passwordError.textContent = "Password is required";
        isValid = false;
    } else if (password.length < 6) {
        passwordError.textContent = "Password must be at least 6 characters";
        isValid = false;
    }


    // If valid
    if (isValid) {
        // Store in session storage
        sessionStorage.setItem("loggedInUser", email);


        successMessage.textContent = "Login Successful!";


        // Optional: redirect after 1.5 seconds
        setTimeout(function() {
            window.location.href = "Task-mange.html";
        }, 1500);
    }
});
</script>


</body>
</html>
