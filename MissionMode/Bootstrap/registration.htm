<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bootstrap Registration Modal</title>


    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">


<div class="container mt-5 text-center">


    <h2 class="mb-4">User Registration</h2>


    <!-- Button to Open Modal -->
    <button class="btn btn-primary px-4" data-bs-toggle="modal" data-bs-target="#registerModal">
        Register Here
    </button>


</div>


<!-- Modal -->
<div class="modal fade" id="registerModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">


            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title">Registration Form</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>


            <div class="modal-body">


                <form id="registrationForm" novalidate>


                    <!-- Name -->
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" class="form-control" required>
                        <div class="invalid-feedback">
                            Please enter your full name.
                        </div>
                    </div>


                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email" class="form-control" required>
                        <div class="invalid-feedback">
                            Please enter a valid email.
                        </div>
                    </div>


                    <!-- Password -->
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" minlength="6" required>
                        <div class="invalid-feedback">
                            Password must be at least 6 characters.
                        </div>
                    </div>


                    <!-- Gender -->
                    <div class="mb-3">
                        <label class="form-label">Gender</label>
                        <select class="form-select" required>
                            <option value="">Select Gender</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                        <div class="invalid-feedback">
                            Please select your gender.
                        </div>
                    </div>


                    <!-- Terms -->
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" required>
                        <label class="form-check-label">Accept Terms & Conditions</label>
                        <div class="invalid-feedback">
                            You must accept terms.
                        </div>
                    </div>


                    <!-- Submit -->
                    <button type="submit" class="btn btn-success w-100">
                        Register
                    </button>


                </form>


            </div>


        </div>
    </div>
</div>


<!-- Bootstrap 5 JS CDN -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


<!-- Validation Script -->
<script>
(() => {
    'use strict'
    const form = document.getElementById('registrationForm');

    form.addEventListener('submit', function (event) {
        if (!form.checkValidity()) {
            event.preventDefault();
            event.stopPropagation();
        } else {
            event.preventDefault(); 
            
            alert("Registration Successful! Redirecting to Login...");
            
            window.location.href = "bootstrap-form.html"; 
        }
        form.classList.add('was-validated');
    }, false);
})();
</script>

</body>
</html>
