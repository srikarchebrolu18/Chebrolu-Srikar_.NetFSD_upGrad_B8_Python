<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>College Event Dashboard</title>

  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
   background: linear-gradient(135deg, #6a11cb, #ff4b2b);
    min-height: 100vh;
  }
  .card img {
    height: 200px;
    object-fit: cover;
  }
</style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
  <div class="container">
    <a class="navbar-brand" href="#">College Events</a>

    <!-- Toggle button -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Collapsible content -->
    <div class="collapse navbar-collapse" id="navbarContent">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link active" href="#">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="#">Events</a>
        </li>
      </ul>
    </div>
  </div>
</nav>


<!-- ================= MAIN DASHBOARD ================= -->
<div class="container my-5">

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3>Event List</h3>

    <!-- Button to open modal -->
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#eventModal">
      Add Event
    </button>
  </div>

  <!-- Responsive Grid -->
  <div class="row g-4">

    <div class="col-sm-12 col-md-6 col-lg-4">
      <div class="card shadow h-100">
        <img src="techfest.jpg"
         class="card-img-top"
         alt="Tech Fest Image">
        <div class="card-body">
          <h5 class="card-title">Tech Fest</h5>
          <p class="card-text">Date: 25 March 2026</p>
          <p class="card-text">Location: Auditorium</p>
        </div>
      </div>
    </div>

    <div class="col-sm-12 col-md-6 col-lg-4">
      <div class="card shadow h-100">
        <img src="cultural-night.jpg"
         class="card-img-top"
         alt="Cultural Night Image">
        <div class="card-body">
          <h5 class="card-title">Cultural Night</h5>
          <p class="card-text">Date: 10 April 2026</p>
          <p class="card-text">Location: Open Ground</p>
        </div>
      </div>
    </div>

  </div>
</div>


<!-- ================= MODAL ================= -->
<div class="modal fade" id="eventModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Add New Event</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <form>

          <div class="mb-3">
            <label class="form-label">Event Name</label>
            <input type="text" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Event Date</label>
            <input type="date" class="form-control" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text" class="form-control" required>
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Save Event
          </button>

        </form>
      </div>

    </div>
  </div>
</div>


<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
