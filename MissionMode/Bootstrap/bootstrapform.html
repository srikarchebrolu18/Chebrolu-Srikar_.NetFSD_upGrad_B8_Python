<!DOCTYPE html>
<html>
<head>
    <title>Basic Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="card p-4" style="width: 300px;">
        <h4 class="text-center mb-3">Registration Form</h4>

        <div class="mb-3">
            <input type="text" id="name" class="form-control" placeholder="Enter your name">
            <small id="nameError" class="text-danger"></small>
        </div>

        <div class="mb-3">
            <input type="text" id="email" class="form-control" placeholder="Enter your email">
            <small id="emailError" class="text-danger"></small>
        </div>

        <div class="mb-3">
            <input type="password" id="password" class="form-control" placeholder="Enter your password">
            <small id="passwordError" class="text-danger"></small>
        </div>

        <button class="btn btn-primary w-100" onclick="validateForm()">Submit</button>
    </div>

<script>

function validateForm() {

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    const nameError = document.getElementById("nameError");
    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");

    if(name === "" && email === "" && password === "") {
        nameError.innerText = "Name is required";
        emailError.innerText = "Email is required";
        passwordError.innerText = "Password is required";
        return;
    }
    
    else if (password.length < 6) {
        passwordError.innerText = "Password must be at least 6 characters";
        return;
    }

    alert("Form submitted successfully!");
}

</script>

</body>
</html>
