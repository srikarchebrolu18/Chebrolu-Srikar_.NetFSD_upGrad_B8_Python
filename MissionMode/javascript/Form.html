<!DOCTYPE html>
<html>
<head>
    <title>HTML5 Web Form</title>
</head>
<body>

<form>
    Name: <input type="text" name="name"><br><br>
    Age: <input type="number" name="age"><br><br>
    Mobile: <input type="tel" pattern="[0-9]{10}" placeholder="10 digits" maxlength="10" name="mobile"><br><br>
    Email: <input type="email" name="email"><br><br>
    password: <input type="password" required minlength="6" maxlength="12" name="password"><br><br>
    <input type="submit" value="Submit">
</form>
</body>
