<!DOCTYPE html>
<html>
<head>
    <title>CSS Types Example</title>
    <!-- Internal CSS -->
    <style>
        h2 {
            color: blue;
        }
    </style>
    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Inline CSS -->
    <h1 style="color: red;">This is Inline CSS</h1>

    <h2>This is Internal CSS</h2>

    <h3>This is External CSS</h3>
</body>
</html>
